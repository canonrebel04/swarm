# Swarm Configuration

overseer:
  runtime: "mistral-vibe"  # Default runtime for overseer
  model: "mistral-large-latest"  # Default model
  system_prompt: "src/agents/definitions/coordinator.md"

agents:
  max_concurrent: 4
  stall_timeout_seconds: 120
  drift_check_seconds: 20
  require_role_contract: true
  require_structured_output: true
  default_handoff: "reviewer"

roles:
  enabled:
    - scout
    - builder
    - developer
    - tester
    - reviewer
    - merger
    - monitor
  prompts_dir: "src/agents/definitions"
  contracts_dir: "src/roles/contracts"
  strict_locking: true
  forbid_self_reassignment: true

runtimes:
  mistral-vibe:
    binary: "vibe"
    support_level: 2
    programmatic_flag: "-p"
    output_format: "streaming"
  # Add other runtimes as needed

messaging:
  db_path: ".swarm/messages.db"

worktree:
  base_path: ".swarm/worktrees"
  one_worktree_per_agent: true