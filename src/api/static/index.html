<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Control Plane</title>
    <style>
        :root {
            --bg: #1a1b26;
            --surface: #24283b;
            --primary: #7aa2f7;
            --accent: #bb9af7;
            --text: #c0caf5;
            --text-dim: #565f89;
            --success: #9ece6a;
            --error: #f7768e;
            --border: #414868;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        h1, h2 { margin: 0; color: var(--primary); }
        h2 { font-size: 1.2rem; margin-bottom: 15px; }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #event-log {
            overflow-y: auto;
            flex-grow: 1;
            font-family: "Fira Code", monospace;
            font-size: 0.9em;
            background: #16161e;
            padding: 10px;
            border-radius: 4px;
        }

        .event-row { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .event-time { color: var(--text-dim); margin-right: 10px; }
        .event-source { color: var(--accent); font-weight: bold; }
        .event-type { color: var(--success); }
        
        .error { color: var(--error); }
        .warn { color: #e0af68; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: normal; }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            background: var(--primary);
            color: var(--bg);
        }
    </style>
</head>
<body>

    <header>
        <h1>⬡ Swarm Control Plane</h1>
        <div id="status">Connecting...</div>
    </header>

    <div class="panel">
        <h2>Active Fleet</h2>
        <table id="fleet-table">
            <thead><tr><th>Agent</th><th>Role</th><th>Status</th><th>Task</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel">
        <h2>Live Event Log</h2>
        <div id="event-log"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
