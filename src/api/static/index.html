<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Mission Control</title>
    <link rel="stylesheet" href="theme.css">
</head>
<body>

    <aside>
        <div class="brand">⬡ Swarm</div>
        <nav>
            <ul>
                <li class="active" tabindex="0" role="button">Fleet Dashboard</li>
                <li tabindex="0" role="button">Task Graph</li>
                <li tabindex="0" role="button">Skill Registry</li>
                <li tabindex="0" role="button">System Logs</li>
                <li tabindex="0" role="button">Settings</li>
            </ul>
        </nav>
        <div style="margin-top: auto;">
            <div id="connection-status" class="badge">Connecting...</div>
        </div>
    </aside>

    <main>
        <header>
            <h1>Mission Control</h1>
            <div id="stats-summary">
                <span class="badge">Active Agents: <span id="agent-count">0</span></span>
            </div>
        </header>

        <div class="panel" id="fleet-panel">
            <div class="panel-title">Active Fleet</div>
            <div class="scroll-area" id="agent-cards-container">
                <!-- Agent cards injected here -->
                <p class="text-dim">No agents active.</p>
            </div>
        </div>

        <div class="panel" id="graph-panel">
            <div class="panel-title">Task Graph (DAG)</div>
            <div class="scroll-area" id="task-graph-container" style="display: flex; align-items: center; justify-content: center;">
                <!-- SVG Graph injected here -->
                <p class="text-dim">Task graph initialization...</p>
            </div>
        </div>

        <div class="panel" id="chat-panel" style="grid-column: 1 / -1;">
            <div class="panel-title">Overseer Chat</div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="objective-input" aria-label="New high-level objective" placeholder="Enter new high-level objective..."
                       style="flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text);"
                       onkeypress="if(event.key === 'Enter') submitObjective()">
                <button id="deploy-button" onclick="submitObjective()"
                        style="padding: 0 25px; border-radius: 6px; border: none; background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer;"
                        onmouseover="if(!this.disabled) this.style.opacity='0.9'" onmouseout="if(!this.disabled) this.style.opacity='1'">
                    Deploy Swarm
                </button>
            </div>
        </div>

        <div class="panel" id="event-panel" style="grid-column: 1 / -1;">
            <div class="panel-title">System Event Stream</div>
            <div class="scroll-area" id="event-log">
                <!-- Live logs -->
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
